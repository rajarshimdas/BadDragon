#
# baddragon
#
server {

    listen 127.0.0.1:80;
    server_name sampleapp;

    # -------------------------
    # Security headers
    # -------------------------
    add_header Strict-Transport-Security "max-age=3600" always;

    # -------------------------
    # Document root
    # -------------------------
    root /var/www/arkafe/SampleApp/w3root;
    index index.html index.php;

    # -------------------------
    # Routing
    # -------------------------
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # -------------------------
    # PHP handling
    # -------------------------
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;

        # repeat HSTS (location overrides server headers)
        add_header Strict-Transport-Security "max-age=3600" always;
    }

    # -------------------------
    # Static assets (future-proof)
    # -------------------------
    location ~* \.(css|js|png|jpg|jpeg|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Strict-Transport-Security "max-age=3600" always;
    }

    # -------------------------
    # Security: block dotfiles
    # -------------------------
    location ~ /\. {
        deny all;
    }
}
